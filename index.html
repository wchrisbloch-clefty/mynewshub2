<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aether Intelligence Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,800;0,9..144,900;1,9..144,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:            #07090f;
      --bg-alt:        #060810;
      --bg-nav:        #070912;
      --surface:       #0c0f1a;
      --surf2:         #111520;
      --border:        #1a2235;
      --bord2:         #151c2e;
      --border-dim:    rgba(26,34,53,0.5);
      --overlay:       rgba(4,8,18,0.85);
      --text:          #f0f4ff;
      --text-b:        #bbc8e0;
      --text-c:        #8fa8c8;
      --muted:         #526070;
      --subtle:        #445060;
      --dim:           #364050;
      --u-bubble:      #111828;
      --u-bubble-b:    #1e2c42;
      --u-bubble-text: #b8cce0;
      --scrollbar:     #1e2c40;
      --scrollbar-h:   #2a3c54;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text-b);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
    }
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-h); }

    @keyframes pulse { 0%,100%{opacity:.35;transform:scale(.85)} 50%{opacity:1;transform:scale(1.1)} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes slideRight { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }
    @keyframes slideInRight { from{opacity:0;transform:translateX(100%)} to{opacity:1;transform:translateX(0)} }
    @keyframes glow { 0%,100%{box-shadow:0 0 20px rgba(0,255,178,.06)} 50%{box-shadow:0 0 40px rgba(0,255,178,.14)} }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .shimmer {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surf2) 50%, var(--surface) 75%);
      background-size: 400px 100%;
      animation: shimmer 1.4s infinite;
    }
  </style>
  <!-- Prevent flash of wrong theme on load -->
  <script>
    (function() {
      var t = localStorage.getItem('aether-theme');
      if (t === 'light') {
        var r = document.documentElement.style;
        r.setProperty('--bg',            '#f4f6fb');
        r.setProperty('--bg-alt',        '#eef1f8');
        r.setProperty('--bg-nav',        '#f0f3f9');
        r.setProperty('--surface',       '#ffffff');
        r.setProperty('--surf2',         '#eaf0fc');
        r.setProperty('--border',        '#dae0ed');
        r.setProperty('--bord2',         '#e4e9f5');
        r.setProperty('--border-dim',    'rgba(180,192,218,0.4)');
        r.setProperty('--overlay',       'rgba(20,32,56,0.45)');
        r.setProperty('--text',          '#0d1525');
        r.setProperty('--text-b',        '#1a2740');
        r.setProperty('--text-c',        '#2e4060');
        r.setProperty('--muted',         '#5c7090');
        r.setProperty('--subtle',        '#5c7090');
        r.setProperty('--dim',           '#8ea0bc');
        r.setProperty('--u-bubble',      '#e8f0fc');
        r.setProperty('--u-bubble-b',    '#c0d4f0');
        r.setProperty('--u-bubble-text', '#1a3560');
        r.setProperty('--scrollbar',     '#c0cedf');
        r.setProperty('--scrollbar-h',   '#a8bacf');
      }
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
